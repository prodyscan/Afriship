<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - AfriShipPlus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topbar">
    <h2>Dashboard Admin</h2>
    <button type="button" onclick="logoutAdmin()">Déconnexion</button>
  </div>

  <div class="container">
    <div class="card">
      <h2>Statistiques</h2>
      <div id="adminStats">Chargement...</div>
    </div>

    <div class="card">
      <h2>Bilan filtré</h2>

      <label>Type</label>
      <select id="filterType" onchange="loadAdminStats(); loadAdminShipments();">
        <option value="">Tous</option>
        <option value="AIR">Aérien</option>
        <option value="SEA">Maritime</option>
      </select>

      <label>Statut</label>
      <select id="filterStatus" onchange="loadAdminStats(); loadAdminShipments();">
        <option value="">Tous</option>
        <option value="Demande créée">Demande créée</option>
        <option value="CONTACTED">Contacté</option>
        <option value="IN_TRANSIT">En transit</option>
        <option value="DELIVERED">Livré</option>
        <option value="CANCELLED">Annulé</option>
      </select>

      <label>Téléphone client</label>
      <input
        id="filterPhone"
        type="text"
        placeholder="Ex : 0777..."
        oninput="loadAdminStats(); loadAdminShipments();"
      />
    </div>

    <div class="card">
      <h2>Expéditions</h2>
      <div id="adminShipments">Chargement...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</body>
</html>
